services:
  # 
  # This is the Pytthon API Gateway
  # 
  api_gateway_service:
    build: .
    image: python:for_api_gateway
    container_name: api_gateway

    ports:
      - "3131:3131"

  # 
  # This is our AI Engine running the LLMs, image recognition
  # 
  llm_service:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11434:11434"
    
    volumes:
      - ollama_data:/root/.ollama

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  #
  # This is the mariadb database service
  #
  db_service:
    image: mariadb:latest
    container_name: db_service

    volumes:
      - mariadb_data:/var/lib/mysql

    environment:
      - MARIADB_ROOT_PASSWORD=1234
      - MARIADB_DATABASE=users_db
      - MARIADB_USER=python_api
      - MARIADB_PASSWORD=1234

  # 
  # This is extra so we don't have to download the AI models manually
  # 
  llm_init:
    image: ollama/ollama:latest
    container_name: ollama_model_puller

    environment:
      - OLLAMA_HOST=llm_service:11434
    depends_on:
      - llm_service
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Waiting for Ollama to boot...' &&
      sleep 10 &&
      echo 'Pulling LLaVA (Vision)...' &&
      ollama pull llava &&
      echo 'Pulling Llama 3.2 (Nutrition)...' &&
      ollama pull llama3.2 &&
      echo 'All models pulled successfully! Shutting down init container.'
      "


volumes:
  ollama_data:
  mariadb_data: